<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Bus Request</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Source Sans 3", "Segoe UI", "Helvetica Neue", "Arial", "sans-serif"],
              display: ["Cormorant Garamond", "Georgia", "serif"],
            },
            colors: {
              navy: "#123b74",
              presbyRed: "#c7333a",
              presbyGold: "#c8a64f",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="member-shell request-page font-sans antialiased text-slate-900 bg-white">
    <main class="page page-member">
      <section class="member-brand-strip">
        <img src="/pcglogo.png" alt="Presbyterian Church of Ghana logo" class="member-brand-strip-logo" />
        <div class="member-brand-strip-copy">
          <p class="member-brand-strip-name">Christ Adenta Presby</p>
          <p class="member-brand-strip-role">Presbyterian Church of Ghana</p>
        </div>
      </section>

      <section class="request-topbar">
        <div>
          <p class="eyebrow">Request Tracking</p>
          <h1 class="font-display">Track Your Bus Request</h1>
        </div>
      </section>

      <section class="panel tracking-panel">
        <form id="trackingForm" class="tracking-form">
          <label>
            <span>Tracking code</span>
            <input id="trackingCodeInput" class="tracking-code-input" type="text" placeholder="BUS-1234ABCD" autocomplete="off" />
          </label>
          <button class="primary-button" type="submit">Check status</button>
        </form>

        <div id="trackingMessage" class="form-message" aria-live="polite"></div>

        <section id="trackingResult" class="tracking-result" hidden>
          <div class="tracking-head">
            <div>
              <p class="eyebrow">Tracking code</p>
              <h2 id="trackingCodeTitle" class="tracking-code-display"></h2>
            </div>
            <span id="trackingStatusBadge" class="status-badge"></span>
          </div>

          <div class="tracking-summary">
            <div>
              <span>Event</span>
              <strong id="trackingEventName"></strong>
            </div>
            <div>
              <span>Date</span>
              <strong id="trackingDateRange"></strong>
            </div>
            <div>
              <span>Payment</span>
              <strong id="trackingPayment"></strong>
            </div>
          </div>

          <ol class="tracking-steps" aria-label="Request progress">
            <li id="trackingStepSubmitted">
              <span></span>
              <div>
                <strong>Request submitted</strong>
                <p id="trackingSubmittedAt"></p>
              </div>
            </li>
            <li id="trackingStepApproval">
              <span></span>
              <div>
                <strong>Approved to pay</strong>
                <p id="trackingApprovalText"></p>
              </div>
            </li>
            <li id="trackingStepPaid">
              <span></span>
              <div>
                <strong>Payment confirmed</strong>
                <p id="trackingPaymentText"></p>
              </div>
            </li>
            <li id="trackingStepRelease">
              <span></span>
              <div>
                <strong>Bus released</strong>
                <p id="trackingDecisionText"></p>
              </div>
            </li>
          </ol>

          <p id="trackingAdminNote" class="tracking-note" hidden></p>
        </section>
      </section>
    </main>

    <script type="module" src="/track.js"></script>
  </body>
</html>
