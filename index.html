<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Church Bus Booker</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Source Sans 3", "Segoe UI", "Helvetica Neue", "Arial", "sans-serif"],
              display: ["Cormorant Garamond", "Georgia", "serif"],
            },
            colors: {
              navy: "#123b74",
              presbyRed: "#c7333a",
              presbyGold: "#c8a64f",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="member-shell home-shell font-sans antialiased text-slate-900 bg-white">
    <main class="home-page">
      <section class="member-brand-strip member-brand-strip-home">
        <img src="/pcglogo.png" alt="Presbyterian Church of Ghana logo" class="member-brand-strip-logo" />
        <div class="member-brand-strip-copy">
          <p class="member-brand-strip-name">Christ Adenta Presby</p>
          <p class="member-brand-strip-role">Presbyterian Church of Ghana</p>
        </div>
      </section>

      <section class="hero-carousel home-hero-carousel" aria-label="Church bus image carousel">
        <div
          id="heroCarouselTrack"
          class="hero-carousel-track"
          style="background-image: url('https://images.unsplash.com/photo-1570125909232-eb263c188f7e?auto=format&fit=crop&w=2200&q=90')"
          data-slides='[
            "https://images.unsplash.com/photo-1570125909232-eb263c188f7e?auto=format&fit=crop&w=2200&q=90",
            "https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&w=2200&q=90",
            "https://images.unsplash.com/photo-1564694202779-bc908c327862?auto=format&fit=crop&w=2200&q=90"
          ]'
        >
          <div class="home-glass-card">
            <div class="home-brand">
              <div>
                <p class="home-kicker">Christ Congregation Adenta</p>
                <p class="home-subbrand">Church transport desk</p>
              </div>
            </div>

            <div class="home-card-copy">
              <p class="home-label">Bus reservation</p>
              <h1>Bus Reservation.</h1>
              <!-- <p>
                Choose your travel dates, check the bus availability, and continue with the official booking form.
              </p> -->
            </div>

            <a class="home-check-button" href="/availability">Check Booking Availability</a>

            <p class="home-footnote">
              Dependable transport for ministry, outreach, fellowship and approved external events.
            </p>

            <div id="pageNotice" class="form-message page-notice" aria-live="polite" hidden></div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
