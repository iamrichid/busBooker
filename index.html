<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Church Bus Booker</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Manrope", "Segoe UI", "Helvetica Neue", "Arial", "sans-serif"],
              display: ["Fraunces", "Georgia", "serif"],
            },
            colors: {
              navy: "#11274a",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="member-shell font-sans antialiased text-slate-900 bg-white">
    <main class="page page-member">
      <section class="hero-carousel" aria-label="Church bus image carousel">
        <button id="heroPrevButton" class="carousel-arrow carousel-arrow-left" type="button" aria-label="Previous slide">
          &#10094;
        </button>

        <div
          id="heroCarouselTrack"
          class="hero-carousel-track"
          data-slides='[
            "https://images.unsplash.com/photo-1570125909232-eb263c188f7e?auto=format&fit=crop&w=1600&q=80",
            "https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&w=1600&q=80",
            "https://images.unsplash.com/photo-1564694202779-bc908c327862?auto=format&fit=crop&w=1600&q=80"
          ]'
        >
          <div class="hero-carousel-overlay">
            <div class="landing-identity">
              <img src="/pcg-logo.png?v=3" alt="Presbyterian Church logo" class="landing-identity-logo" />
              <p>Presbyterian Church of Ghana, Christ Congregation - Adentan</p>
            </div>
            <h1 class="font-display text-4xl leading-tight text-white md:text-5xl">Church Bus Reservation Booker Online.</h1>
            <p class="hero-text text-base leading-7 text-slate-100">
              Members and outside parties can request the bus once, then the transport team reviews and approves.
            </p>
            <p class="landing-media-note text-white">
              Dependable transport for ministry, outreach, fellowship and any other event.
            </p>

            <div class="hero-actions landing-cta items-center gap-4">
              <a class="ghost-button" href="/availability">Check availability</a>
              <button
                id="openBookingButton"
                class="primary-button landing-cta-button rounded-lg px-6 py-3 text-sm font-semibold tracking-tight"
                type="button"
                data-open-booking
              >
                Request the bus
              </button>
            </div>

            <div id="pageNotice" class="form-message page-notice" aria-live="polite" hidden></div>
          </div>
        </div>

        <button id="heroNextButton" class="carousel-arrow carousel-arrow-right" type="button" aria-label="Next slide">
          &#10095;
        </button>
      </section>

    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
